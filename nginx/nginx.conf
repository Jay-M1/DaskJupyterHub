worker_processes 1;

events { worker_connections 1024; 
}

http {
    # Use Docker's internal DNS so upstream IPs are re-resolved after container restarts
    resolver 127.0.0.11 valid=10s;

    # Rate limiting — 10 login attempts per minute per IP
    limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;

    # WebSocket Upgrade Handling
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 443 ssl;
        server_name bms1.etp.kit.edu;

        ssl_certificate /etc/letsencrypt/live/bms1.etp.kit.edu/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/bms1.etp.kit.edu/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        add_header Strict-Transport-Security max-age=15768000;

        set $hub http://jupyterhub:8555;

        location /hub/login {
            limit_req zone=login burst=5 nodelay;
            proxy_pass $hub;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header X-Scheme $scheme;
            proxy_buffering off;
        }

        location / {
            proxy_pass $hub;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header X-Scheme $scheme;
            proxy_buffering off;
        }

        location /clusters/ {
            proxy_pass http://host.docker.internal:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
        }

        location ~ /.well-known {
            allow all;
        }
    }
}
