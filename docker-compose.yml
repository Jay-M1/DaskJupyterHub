name: jupyterhub-htcondor

services:

  htrocky:
    image: my_rocky_image
    build:
      context: ./rocky
      args:
        GIT_REPO_VERSION: "48cf87f"
    network_mode: host
    ports:
      - "9618:9618"
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/dask-gateway:/var/lib/dask-gateway
      #- /var/lib/condor:/var/lib/condor
      - /home:/home
      #- /etc/condor/tokens.d/:/etc/condor/tokens.d/
      - /var/lib/condor/fs_auth:/var/lib/condor/fs_auth
      - /etc/condor/security/pool_pw.passwd:/etc/condor/security/pool_pw.passwd
    env_file:
      - .env
  jupyterhub:
    image: my_jupyterhub-jupyterhub
    build:
      context: ./jupy
    env_file:
      - .env
    network_mode: host
    volumes:
      - ./jupy/jupyterhub_config.py:/srv/jupyterhub/jupyterhub_config.py
      - ./jupy/jupyter.token:/srv/jupyterhub/jupyter.token
      # Persist the hub DB, cookie secret and auth_state key so recreating the
      # hub container does not orphan running notebook servers (which would
      # break dask-gateway auth with a 401). Named volume => secrets stay off
      # the git repo. Only wiped by an explicit `docker volume rm`.
      - hub-state:/srv/jupyterhub/state
      - /home:/home
      - /var/lib/condor/fs_auth:/var/lib/condor/fs_auth
      - /etc/condor/security/pool_pw.passwd:/etc/condor/security/pool_pw.passwd

  notebook:
    depends_on:
      - jupyterhub
      - htrocky
    image: jnotebook_image
    build:
      context: ./jupy/notebook
    networks:
      - jupyternet

  nginx:
    image: nginx_image
    build:
      context: ./nginx
    ports:
      - "443:443"
      - "80:80"
    networks:
      - jupyternet
    depends_on:
      - jupyterhub
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./nginx/certbot-webroot:/var/www/certbot:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  jupyternet:
    driver: overlay
    attachable: true

volumes:
  hub-state:
